name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Dependencies
        # On utilise 'npm install' au lieu de 'npm ci' car tu n'as pas de lockfile
        run: npm install

      - name: Export Project
        # On exporte le projet pour Android
        run: npx expo export --platform android
